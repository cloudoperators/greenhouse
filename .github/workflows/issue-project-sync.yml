name: Issue Project Sync
on:
  issues:
    types: [labeled]

permissions:
  issues: read

jobs:
  sync:
    if: github.event.label.name == 'backlog'
    runs-on: ubuntu-latest
    steps:
      - uses: cloudoperators/common/workflows/issue-project-sync@f26f4ef8a904160c45e9fc942423d6be2ffd0f03 # main
        with:
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
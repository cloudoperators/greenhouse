name: CI E2E Info

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  detect:
    name: Detect relevant suites
    runs-on: [ubuntu-latest]
    outputs:
      changes: ${{ steps.filter.outputs.changes }}
      has-suites: ${{ steps.classify.outputs.has-suites }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Filter e2e suites
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: .github/paths-filters-e2e.yaml

      - name: Check e2e suites
        id: classify
        env:
          CHANGES: ${{ steps.filter.outputs.changes }}
        run: |
          # has-suites = true if the changes array is non-empty
          if [ "${CHANGES:-[]}" = "[]" ]; then
            echo "has-suites=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-suites=true" >> "$GITHUB_OUTPUT"
          fi

  info-comment:
    name: Info comment
    needs: [detect]
    if: needs.detect.outputs.has-suites == 'true' && github.event.pull_request.user.login != 'renovate[bot]'
    runs-on: [ubuntu-latest]
    steps:
      - name: E2E Info
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v8.0.0
        env:
          CHANGES: ${{ needs.detect.outputs.changes }}
        with:
          script: |
            const marker = '<!-- ci-e2e:info -->';
            const matched = JSON.parse(process.env.CHANGES || '[]');
            const sharedHit = matched.includes('shared');
            const suites = matched.filter(s => s !== 'shared');

            const codeBlock = (s) => '```\n' + s + '\n```';

            let body = `${marker}\n## E2E\n\n`;

            if (sharedHit) {
              body += `Shared code changed — full E2E run is recommended.\n\n`;
              body += codeBlock('/e2e all');
            } else {
              body += `E2E suites were found for the changes — [${suites.map(s => `\`${s}\``).join(', ')}]\n\n`;
              body += suites.map(s => `<details><summary><b>/e2e ${s}</b></summary></details>`).join('\n') + '\n\n';
              body += `Comment in the PR to trigger an E2E test, for example:\n\n`;
              body += codeBlock('/e2e ' + suites.join(' ')) + '\n';
              body += `_or run the full set:_ \`/e2e all\`\n`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.body && c.body.startsWith(marker)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  auto-skip-e2e:
    name: Auto-skip e2e
    needs: [detect]
    if: needs.detect.outputs.has-suites == 'false' && github.event.pull_request.user.login != 'renovate[bot]'
    runs-on: [ubuntu-latest]
    steps:
      - name: Post /e2e skip comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v8.0.0
        with:
          script: |
            const marker = '<!-- ci-e2e:auto-skip -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            if (comments.find(c => c.body && c.body.startsWith(marker))) {
              core.info('Auto-skip comment already posted; nothing to do.');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${marker}\n/e2e skip`,
            });

  auto-run-e2e-renovate:
    name: Auto-run e2e for renovate
    needs: [detect]
    if: github.event.pull_request.user.login == 'renovate[bot]'
    runs-on: [ubuntu-latest]
    steps:
      - name: Post /e2e command comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v8.0.0
        env:
          HAS_SUITES: ${{ needs.detect.outputs.has-suites }}
        with:
          script: |
            const marker = '<!-- ci-e2e:renovate-autorun -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            if (comments.find(c => c.body && c.body.startsWith(marker))) {
              core.info('Renovate autorun comment already posted; nothing to do.');
              return;
            }
            const cmd = process.env.HAS_SUITES === 'true' ? '/e2e all' : '/e2e skip';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${marker}\n${cmd}`,
            });

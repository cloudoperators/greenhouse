name: CI PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  statuses: write

jobs:
  changes:
    name: Detect changes
    runs-on: [ubuntu-latest]
    outputs:
      go: ${{ steps.filter.outputs.go }}
      api: ${{ steps.filter.outputs.api }}
      charts: ${{ steps.filter.outputs.charts }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: .github/paths-filters-ci.yaml

  lint:
    name: Lint
    needs: [changes]
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Check generated files are up to date
        if: needs.changes.outputs.api == 'true'
        run: |
          make generate-all
          if ! git diff --quiet; then
            echo "::error title=Generated files out of date::Run 'make generate-all' locally and commit the result before pushing again."
            git --no-pager diff
            exit 1
          fi

      - name: Set up Helm
        if: needs.changes.outputs.charts == 'true'
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "v3.19.2"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        if: needs.changes.outputs.charts == 'true'
        with:
          python-version: 3.14
          check-latest: true

      - name: Set up chart-testing
        if: needs.changes.outputs.charts == 'true'
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Run chart-testing (lint)
        if: needs.changes.outputs.charts == 'true'
        run: |
          changed=$(ct list-changed --config ct.yaml --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            ct lint --config ct.yaml --target-branch ${{ github.event.repository.default_branch }}
          fi

      - name: golangci-lint
        if: needs.changes.outputs.go == 'true'
        run: make lint

  test:
    name: Test
    needs: [changes]
    runs-on: [ubuntu-latest]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        if: needs.changes.outputs.go == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Unit tests
        if: needs.changes.outputs.go == 'true'
        run: make test

  license-check:
    name: License check
    permissions:
      contents: write
    uses: cloudoperators/common/.github/workflows/shared-license.yaml@17d3d6b80851574fcd8c7b6e5c4fe6aee2922359
    with:
      apply_header: false

  reuse-check:
    name: Reuse check
    uses: cloudoperators/common/.github/workflows/shared-reuse.yaml@17d3d6b80851574fcd8c7b6e5c4fe6aee2922359

  build:
    name: Build
    needs: [changes]
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Docker image
        if: needs.changes.outputs.go == 'true'
        run: make docker-build

  checksOK:
    name: checksOK
    needs: [lint, test, license-check, reuse-check, build]
    if: always()
    runs-on: [ubuntu-latest]
    steps:
      - name: PR checks
        run: |
          fail=0
          for r in \
            "${{ needs.lint.result }}" \
            "${{ needs.test.result }}" \
            "${{ needs.license-check.result }}" \
            "${{ needs.reuse-check.result }}" \
            "${{ needs.build.result }}"; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then
            echo "::error ::One or more checks failed (lint=${{ needs.lint.result }}, test=${{ needs.test.result }}, license-check=${{ needs.license-check.result }}, reuse-check=${{ needs.reuse-check.result }}, build=${{ needs.build.result }})"
            exit 1
          fi
          echo "All checks passed"

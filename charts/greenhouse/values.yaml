global:
  # The DNS domain to be used for all Greenhouse components.
  dnsDomain:
  dockerHubMirror:
  # OIDC configuration for Greenhouse.
  oidc:
    issuer:
    redirectURL:
    clientID:
    clientSecret:
  # DEX configuration for Greenhouse.
  dex:
    backend: postgres         # postgres or kubernetes
    postgresql:
      postgresqlDatabase:
      postgresqlPort:
      postgresqlUsername:
  # Plugin configuration for Greenhouse.
  plugin:
    expressionEvaluationEnabled: false
    integrationEnabled: false
    ociMirroringEnabled: false

postgresqlng:
  enabled: true
  global:
    # The container image registry used for the postgresql-ng image.
    # This value is required by the postgresql-ng chart; set it to your deployment registry.
    registry:
  alerts:
    support_group: greenhouse
  resources: {}
  # The databases that will be created in the PostgreSQL server.
  # Each database name must have a matching entry in `users` with the same name.
  databases:
    dex: {}
  users:
    dex: {}         # Must match the database name above; this user becomes the database owner

# demo organization
demo:
  enabled: false

# enabled greenhouse controller dashboards
plutono:
  enabled: true
perses:
  enabled: true

# authorization webhook
authz:
  enabled: false

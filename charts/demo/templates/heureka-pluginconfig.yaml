{{- if and .Values.heureka.enabled .Values.heureka.apiEndpoint }}
apiVersion: greenhouse.sap/v1alpha1
kind: Plugin
metadata:
  name: heureka
  namespace: {{ .Chart.Name }}
spec:
  disabled: false
  pluginDefinition: heureka
  displayName: {{ required ".Values.heureka.displayName missing" .Values.heureka.displayName }}
  optionValues:
    - name: apiEndpoint
      value: {{ required ".Values.heureka.apiEndpoint missing" .Values.heureka.apiEndpoint | quote }}
{{ end }}

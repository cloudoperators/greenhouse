apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "authz.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "authz.labels" . | nindent 4 }}
  {{- with merge (.Values.serviceAccount.annotations | default dict) (include "authz.annotations" . | fromYaml | default dict) }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
